server {
    server_name tusllantasmx.com www.tusllantasmx.com;

    root /var/www/tusllantas;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:4242;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /index.html {
        try_files /index.html =404;
    }

    location ~ ^/(?!index\.html$)(.+)\.html$ {
        return 301 /$1$is_args$args;
    }

    location ~* \.(?:html|json)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location ~* \.(?:js|css)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tusllantasmx.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tusllantasmx.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.tusllantasmx.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = tusllantasmx.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name tusllantasmx.com www.tusllantasmx.com;
    return 404; # managed by Certbot
}
